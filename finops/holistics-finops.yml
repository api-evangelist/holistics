meters:
- name: platform_subscription
  description: Fixed monthly or annual platform fee per plan tier (Entry, Standard, SCS).
  unit: subscription
  aggregation: sum
  dimensions:
  - account
  - plan
- name: additional_users
  description: Seats billed beyond the 10 users included in each tier.
  unit: users
  aggregation: sum
  dimensions:
  - account
  - plan
- name: additional_reports
  description: Report packs billed beyond the Entry tier's 100-report allotment.
  unit: reports
  aggregation: sum
  dimensions:
  - account
  - plan
- name: embedded_analytics
  description: Quote-based Embedded Analytics agreement with unlimited viewers and white-labeling.
  unit: contract
  aggregation: sum
  dimensions:
  - account
principles:
- name: Visibility
  description: Track plan tier, seat count, and report volume against the included allotments to anticipate add-on charges.
- name: Allocation
  description: Map seats and reports to teams; tag embedded deployments to the products that consume them.
- name: Optimization
  description: Choose the lowest tier that meets security/SSO needs; prefer annual billing for the discount; reclaim unused seats and prune unused reports under the Entry allotment.
- name: Accountability
  description: Assign an owner for the Holistics subscription; review seat growth and add-ons each renewal cycle against budget.
