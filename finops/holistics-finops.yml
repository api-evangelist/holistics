description: >-
  FinOps view of Holistics spend. Holistics bills a fixed monthly (or
  discounted annual) platform subscription per tier (Entry, Standard, Security
  Compliance Suite), each including the first 10 users, with additional users
  and additional report packs billed as add-ons. The REST and Embed APIs are
  capabilities of the subscription rather than separately metered usage.
  Embedded Analytics and Custom enterprise tiers are quote-based. Primary cost
  drivers are tier selection, seat count above the included 10, and report
  volume above the Entry allotment.
notes: >-
  Subscription list prices are subject to change and vary by region and billing
  cadence; verify against the Holistics pricing page during reconciliation.
