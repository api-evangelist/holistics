aid: holistics
url: https://raw.githubusercontent.com/api-evangelist/holistics/refs/heads/main/apis.yml
name: Holistics
kind: company
description: Holistics is a self-service business intelligence and analytics platform
  built around code-based data modeling (AML - Analytics Modeling Language), Git
  version control, and a SQL/dataset semantic layer. Its REST API lets teams query
  datasets and reports, export data to CSV/JSON/XLSX, trigger data imports and
  transforms, and poll ETL jobs, while a JWT-signed Embed API powers embedded,
  multi-tenant analytics inside customer applications.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Business Intelligence
- Analytics
- Self-Service BI
- Data Modeling
- Embedded Analytics
created: '2026-06-20'
modified: '2026-06-20'
specificationVersion: '0.19'
